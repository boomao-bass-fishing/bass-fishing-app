<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訪問統計 | バス釣り釣果ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0d1b2a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a3a5c, #0d6b8a);
      padding: 20px 32px;
      border-bottom: 3px solid #00b4d8;
    }
    header h1 { font-size: 1.5rem; color: #fff; }
    header a { color: #48cae4; font-size: 0.85rem; text-decoration: none; margin-top: 6px; display: inline-block; }
    main {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .stat-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: #132233;
      border: 1px solid #1e3a50;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
    }
    .stat-card .label {
      font-size: 0.85rem;
      color: #7eb8d4;
      margin-bottom: 10px;
    }
    .stat-card .value {
      font-size: 2.8rem;
      font-weight: 700;
      color: #00b4d8;
    }
    .stat-card .unit {
      font-size: 1rem;
      color: #48cae4;
      margin-left: 4px;
    }
    h2 {
      font-size: 1.1rem;
      color: #00b4d8;
      border-left: 4px solid #00b4d8;
      padding-left: 12px;
      margin-bottom: 16px;
    }
    .chart-wrap {
      background: #132233;
      border: 1px solid #1e3a50;
      border-radius: 12px;
      padding: 24px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .bar-date {
      font-size: 0.82rem;
      color: #7eb8d4;
      width: 90px;
      flex-shrink: 0;
    }
    .bar-bg {
      flex: 1;
      background: #1b2d3e;
      border-radius: 4px;
      height: 24px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0077b6, #00b4d8);
      border-radius: 4px;
      min-width: 4px;
      transition: width 0.4s ease;
    }
    .bar-count {
      font-size: 0.85rem;
      color: #caf0f8;
      width: 40px;
      text-align: right;
      flex-shrink: 0;
    }
    footer {
      text-align: center;
      padding: 30px;
      color: #3a6278;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 訪問統計</h1>
    <a href="/">← トップページへ戻る</a>
  </header>

  <main>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="label">👥 累計訪問数</div>
        <div class="value">{{ total }}<span class="unit">回</span></div>
      </div>
      <div class="stat-card">
        <div class="label">📅 本日の訪問数</div>
        <div class="value">{{ today }}<span class="unit">回</span></div>
      </div>
    </div>

    <h2>過去7日間の訪問数</h2>
    <div class="chart-wrap">
      {% set max_count = last7 | map(attribute='count') | max if last7 else 1 %}
      {% for row in last7 %}
      <div class="bar-row">
        <div class="bar-date">{{ row.date }}</div>
        <div class="bar-bg">
          <div class="bar-fill" style="width: {{ (row.count / max_count * 100) | int }}%"></div>
        </div>
        <div class="bar-count">{{ row.count }}</div>
      </div>
      {% else %}
      <p style="color:#607d8b; font-size:0.9rem;">まだデータがありません。</p>
      {% endfor %}
    </div>
  </main>

  <footer>バス釣り釣果ダッシュボード</footer>
</body>
</html>
